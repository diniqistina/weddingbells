button:hover { background: #4e7a53; }
.result-card { background: #fff9f3; border: 1px solid #b8913a; border-radius: 6px; padding: 30px; position: relative; }
.result-card .topbar { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: #b8913a; border-radius: 6px 6px 0 0; }
.welcome { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #8a7e6e; font-family: Arial, sans-serif; margin-bottom: 6px; }

.seat-block { display: inline-block; background: #f5ead5; border: 1px solid rgba(184,145,58,0.4); border-radius: 4px; padding: 16px 50px; margin-bottom: 16px; }
.seat-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: #b8913a; font-family: Arial, sans-serif; margin-bottom: 6px; font-weight: bold; }
.table-name { font-size: 48px; font-weight: normal; line-height: 1; }
.seat-num { font-size: 13px; color: #8a7e6e; font-family: Arial, sans-serif; margin-top: 4px; }
.again { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #b8913a; cursor: pointer; font-family: Arial, sans-serif; text-decoration: underline; }
.nf-card { background: #fff9f3; border: 1px solid #e8dece; border-radius: 6px; padding: 30px; }
.nf-card h3 { font-size: 22px; font-weight: normal; margin: 0 0 10px; }
.nf-card p { font-size: 14px; color: #8a7e6e; font-family: Arial, sans-serif; margin: 0 0 16px; line-height: 1.6; }
.match-list { border: 1px solid #e8dece; border-radius: 4px; overflow: hidden; margin-bottom: 16px; text-align: left; }
.match-item { padding: 12px 16px; border-bottom: 1px solid #e8dece; cursor: pointer; }
.match-item:last-child { border-bottom: none; }
.match-item:hover { background: #f5ead5; }
.mi-name { font-size: 16px; font-weight: bold; font-family: Arial, sans-serif; }
.mi-sub { font-size: 13px; color: #8a7e6e; font-family: Arial, sans-serif; margin-top: 2px; }
footer { margin-top: 40px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #d8cebc; font-family: Arial, sans-serif; }

var multi = [];

document.getElementById('search-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch();
});

function doSearch() {
  var raw = document.getElementById('search-input').value.trim();
  if (!raw) return;
  var words = raw.toLowerCase().split(/\s+/);
  var matches = guests.filter(function(g) {
    var n = g.name.toLowerCase();
    return words.every(function(w) { return n.indexOf(w) !== -1; });
  });
  var area = document.getElementById('result-area');
  if (matches.length === 0) {
    area.innerHTML = '<div class="nf-card"><h3>Name not found</h3><p>We could not find "' + raw + '" on the guest list. Try a different spelling or check with the coordinator.</p><span class="again" onclick="reset()">Try again</span></div>';
  } else if (matches.length === 1) {
    showResult(matches[0]);
  } else {
    multi = matches;
    var items = '';
    for (var i = 0; i < matches.length; i++) {
      items += '<div class="match-item" onclick="pick(' + i + ')"><div class="mi-name">' + matches[i].name + '</div><div class="mi-sub">Table ' + matches[i].table + ' &middot; Seat ' + matches[i].seat + '</div></div>';
    }
    area.innerHTML = '<div class="nf-card"><h3>Multiple matches</h3><p>Please select your name:</p><div class="match-list">' + items + '</div><span class="again" onclick="reset()">Search again</span></div>';
  }
}

function pick(i) { showResult(multi[i]); }

function showResult(g) {
  document.getElementById('result-area').innerHTML =
    '<div class="result-card"><div class="topbar"></div>' +
    '<div class="welcome">Welcome</div>' +
    '<div class="gname">' + g.name + '</div>' +
    '<div class="seat-block"><div class="seat-label">Your Table</div><div class="table-name">' + g.table + '</div><div class="seat-num">Seat ' + g.seat + '</div></div><br><br>' +
    '<span class="again" onclick="reset()">Search for another guest</span></div>';
}

function reset() {
  document.getElementById('result-area').innerHTML = '';
  document.getElementById('search-input').value = '';
  document.getElementById('search-input').focus();
}
